<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #8b6f47;
  --gold-light: #b8956a;
  --gold-pale: rgba(139,111,71,0.1);
  --bg: #faf7f2;
  --bg2: #ffffff;
  --bg3: #f5f1e8;
  --bg4: #ede8de;
  --border: rgba(139,111,71,0.18);
  --border2: rgba(139,111,71,0.09);
  --text: #2d2d2d;
  --mid: #7a7267;
  --light: #b0a898;
  --green: #3d9e60;
  --green-bg: rgba(61,158,96,0.1);
  --red: #d94f4f;
  --red-bg: rgba(217,79,79,0.1);
  --blue: #4a7fb5;
  --blue-bg: rgba(74,127,181,0.1);
  --purple: #7c5cbf;
  --purple-bg: rgba(124,92,191,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  font-family:'DM Sans',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
}

.screen { display:none; min-height:100vh; padding-bottom:85px; }
.screen.active { display:block; }

.nav {
  position: fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background: var(--bg2);
  border-top: 1px solid var(--border2);
  display: flex; justify-content: space-around; align-items: center;
  padding: 10px 0 20px;
  z-index: 100;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  color: var(--light); font-size: 10px; font-family: 'DM Sans', sans-serif;
  padding: 4px 16px; border-radius: 12px; transition: all 0.2s;
}
.nav-btn.active { color: var(--gold); }
.nav-btn svg { width:22px; height:22px; }

.header {
  padding: 56px 20px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.header-greeting { font-size: 13px; color: var(--mid); margin-bottom: 2px; }
.header-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--text); }
.header-date { font-size: 12px; color: var(--light); margin-top: 4px; }
.add-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--gold); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(139,111,71,0.3);
}
.add-btn svg { width: 20px; height: 20px; stroke: white; }

.progress-bar-wrap { margin-top: 14px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--mid); margin-bottom: 6px; }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 10px; transition: width 0.4s ease; }

.section { padding: 20px 20px 0; }
.section-title { font-size: 11px; font-weight: 600; color: var(--light); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

.task-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.2s;
  cursor: pointer;
}
.task-card.done { opacity: 0.5; }
.task-card.done .task-name { text-decoration: line-through; }

.task-check {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; background: white;
}
.task-check.checked { background: var(--green); border-color: var(--green); }
.task-check svg { width: 13px; height: 13px; stroke: white; display: none; }
.task-check.checked svg { display: block; }

.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 15px; font-weight: 500; color: var(--text); }
.task-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.task-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  letter-spacing: 0.03em;
}
.badge-daily { background: var(--blue-bg); color: var(--blue); }
.badge-weekly { background: var(--purple-bg); color: var(--purple); }
.badge-monthly { background: var(--gold-pale); color: var(--gold); }
.badge-once { background: var(--green-bg); color: var(--green); }
.task-time { font-size: 11px; color: var(--light); display: flex; align-items: center; gap: 3px; }
.task-time svg { width: 11px; height: 11px; stroke: var(--light); }

.task-menu-btn {
  background: none; border: none; cursor: pointer; padding: 4px;
  color: var(--light); flex-shrink: 0;
}
.task-menu-btn svg { width: 18px; height: 18px; }

/* Stats screen */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px;
  padding: 16px; text-align: center;
}
.stat-num { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--gold); }
.stat-label { font-size: 11px; color: var(--mid); margin-top: 2px; }

.streak-card {
  margin: 0 20px 10px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 16px; padding: 20px;
  display: flex; align-items: center; gap: 16px;
}
.streak-icon { font-size: 36px; }
.streak-info .streak-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: white; }
.streak-info .streak-label { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 2px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px; width: 100%; max-width: 430px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; }

.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--mid); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px;
  color: var(--text); background: var(--bg); outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--gold); }
.form-select {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px;
  color: var(--text); background: var(--bg); outline: none; appearance: none;
}

.freq-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.freq-btn {
  padding: 10px 0; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--bg); font-size: 12px; font-weight: 600; color: var(--mid);
  cursor: pointer; text-align: center; transition: all 0.2s;
}
.freq-btn.selected { background: var(--gold); border-color: var(--gold); color: white; }

.submit-btn {
  width: 100%; padding: 15px; background: var(--gold); color: white;
  border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px;
  box-shadow: 0 4px 12px rgba(139,111,71,0.3);
}

.empty-state { text-align: center; padding: 60px 20px; color: var(--light); }
.empty-state svg { width: 48px; height: 48px; stroke: var(--border); margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Notification toast */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: white; padding: 10px 20px;
  border-radius: 20px; font-size: 13px; z-index: 300;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Reminder bell */
.bell-active { color: var(--gold) !important; }

/* Upcoming card */
.upcoming-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.upcoming-day-badge {
  min-width: 44px; height: 44px; border-radius: 12px;
  background: var(--gold-pale); display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.upcoming-day-num { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--gold); line-height: 1; }
.upcoming-day-label { font-size: 9px; color: var(--gold-light); font-weight: 600; letter-spacing: 0.04em; }
.upcoming-task-name { font-size: 14px; font-weight: 500; color: var(--text); }
.upcoming-task-sub { font-size: 11px; color: var(--light); margin-top: 2px; }

.task-reminder-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold); margin-left: 2px; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- TODAY SCREEN -->
<div class="screen active" id="screen-today">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-greeting">Good morning, Hugo 👋</div>
        <div class="header-title">Today's Tasks</div>
        <div class="header-date" id="today-date"></div>
      </div>
      <button class="add-btn" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span id="progress-text">0 of 0 done</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Pending</div>
    <div id="pending-list"></div>
  </div>
  <div class="section" id="done-section" style="display:none">
    <div class="section-title">Completed</div>
    <div id="done-list"></div>
  </div>
  <div class="section" id="upcoming-section">
    <div class="section-title">Coming Up</div>
    <div id="upcoming-list"></div>
  </div>
</div>

<!-- ALL TASKS SCREEN -->
<div class="screen" id="screen-all">
  <div class="header">
    <div class="header-title">All Tasks</div>
    <div class="header-date">Manage your recurring tasks</div>
  </div>
  <div class="section" style="padding-top:20px">
    <div id="all-tasks-list"></div>
  </div>
</div>

<!-- STATS SCREEN -->
<div class="screen" id="screen-stats">
  <div class="header">
    <div class="header-title">Progress</div>
    <div class="header-date">Your completion stats</div>
  </div>
  <div style="padding-top:20px">
    <div class="streak-card">
      <div class="streak-icon">🔥</div>
      <div class="streak-info">
        <div class="streak-num" id="streak-num">0</div>
        <div class="streak-label">Day streak</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-today">0</div>
        <div class="stat-label">Done today</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-week">0</div>
        <div class="stat-label">This week</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-rate">0%</div>
        <div class="stat-label">Completion rate</div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-today" onclick="showScreen('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="15" r="1" fill="currentColor"/><circle cx="12" cy="15" r="1" fill="currentColor"/></svg>
    Today
  </button>
  <button class="nav-btn" id="nav-all" onclick="showScreen('all')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor"/><circle cx="3" cy="12" r="1.5" fill="currentColor"/><circle cx="3" cy="18" r="1.5" fill="currentColor"/></svg>
    All Tasks
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showScreen('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
</nav>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add New Task</div>
    <div class="form-group">
      <label class="form-label">Task name</label>
      <input class="form-input" id="task-name" placeholder="e.g. Drink 3L water" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Time (optional)</label>
      <input class="form-input" id="task-time" type="time">
    </div>
    <div class="form-group">
      <label class="form-label">How often?</label>
      <div class="freq-grid">
        <button class="freq-btn selected" onclick="selectFreq('daily', this)">Daily</button>
        <button class="freq-btn" onclick="selectFreq('weekly', this)">Weekly</button>
        <button class="freq-btn" onclick="selectFreq('monthly', this)">Monthly</button>
        <button class="freq-btn" onclick="selectFreq('once', this)">Once</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="task-category">
        <option value="health">🏃 Health & Fitness</option>
        <option value="work">💼 Work & Study</option>
        <option value="admin">📋 Admin</option>
        <option value="personal">⭐ Personal</option>
        <option value="finance">💰 Finance</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Reminder notification</label>
      <select class="form-select" id="task-reminder">
        <option value="">No reminder</option>
        <option value="ontime">At task time</option>
        <option value="15min">15 min before</option>
        <option value="30min">30 min before</option>
        <option value="1hr">1 hour before</option>
        <option value="morning">Every morning 8 AM</option>
      </select>
    </div>
    <button class="submit-btn" onclick="addTask()">Add Task ✓</button>
    <button style="width:100%;padding:12px;background:none;border:none;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:8px;" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- EDIT TASK MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Task</div>
    <div class="form-group">
      <label class="form-label">Task name</label>
      <input class="form-input" id="edit-task-name" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Time (optional)</label>
      <input class="form-input" id="edit-task-time" type="time">
    </div>
    <div class="form-group">
      <label class="form-label">How often?</label>
      <div class="freq-grid" id="edit-freq-grid">
        <button class="freq-btn" onclick="selectEditFreq('daily', this)">Daily</button>
        <button class="freq-btn" onclick="selectEditFreq('weekly', this)">Weekly</button>
        <button class="freq-btn" onclick="selectEditFreq('monthly', this)">Monthly</button>
        <button class="freq-btn" onclick="selectEditFreq('once', this)">Once</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="edit-task-category">
        <option value="health">🏃 Health & Fitness</option>
        <option value="work">💼 Work & Study</option>
        <option value="admin">📋 Admin</option>
        <option value="personal">⭐ Personal</option>
        <option value="finance">💰 Finance</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Reminder notification</label>
      <select class="form-select" id="edit-task-reminder">
        <option value="">No reminder</option>
        <option value="ontime">At task time</option>
        <option value="15min">15 min before</option>
        <option value="30min">30 min before</option>
        <option value="1hr">1 hour before</option>
        <option value="morning">Every morning 8 AM</option>
      </select>
    </div>
    <button class="submit-btn" onclick="saveEdit()">Save Changes ✓</button>
    <button style="width:100%;padding:12px;background:none;border:none;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:8px;" onclick="closeEditModal()">Cancel</button>
  </div>
</div>

<script>
// ── DATA ──
let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
let completions = JSON.parse(localStorage.getItem('taskflow_completions') || '{}');
let selectedFreq = 'daily';
let editingId = null;

const categoryEmoji = { health:'🏃', work:'💼', admin:'📋', personal:'⭐', finance:'💰' };
const freqColors = { daily:'badge-daily', weekly:'badge-weekly', monthly:'badge-monthly', once:'badge-once' };

function todayKey() {
  return new Date().toISOString().split('T')[0];
}

function save() {
  localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  localStorage.setItem('taskflow_completions', JSON.stringify(completions));
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  // Set date
  const d = new Date();
  document.getElementById('today-date').textContent = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

  // Greeting
  const h = d.getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.querySelector('.header-greeting').textContent = greet + ', Hugo 👋';

  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // Add default tasks if empty
  if (tasks.length === 0) {
    tasks = [
      // Daily
      { id: 20, name: 'Make Beds', time: '', freq: 'daily', category: 'personal', reminder: 'morning' },
      { id: 23, name: 'Wash Dishes', time: '', freq: 'daily', category: 'personal', reminder: 'morning' },
      { id: 24, name: 'Sweep / Vacuum floors', time: '', freq: 'daily', category: 'personal', reminder: 'morning' },
      { id: 25, name: 'Take the trash out', time: '', freq: 'daily', category: 'personal', reminder: 'morning' },
      // Weekly — all on Sunday (reset day)
      { id: 31, name: 'Laundry', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 19, name: 'Changing towel', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 32, name: 'Clean Sinks and Drains', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 11, name: 'Clean the mirrors', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 12, name: 'Clean the dining table', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 33, name: 'Clean Dishwasher', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 13, name: 'Water the plants', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 14, name: 'Dust off the furniture', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 34, name: 'Organize Pantry', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 15, name: 'Wiping out the dust', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 27, name: 'Mop Floors', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 28, name: 'Clean Pet Supplies', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 16, name: 'Change the sheets', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 17, name: 'Clean shower & toilet', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      { id: 29, name: 'Clean Vehicle', time: '', freq: 'weekly', weekDay: 0, category: 'personal', reminder: 'morning' },
      // Monthly — monthDay: day of month
      { id: 35, name: 'Clean Windows and Curtains', time: '', freq: 'monthly', monthDay: 5, category: 'personal', reminder: 'morning' },
      { id: 6, name: 'Clean fan', time: '', freq: 'monthly', monthDay: 7, category: 'personal', reminder: 'morning' },

// ── SCREENS ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'today') renderToday();
  if (name === 'all') renderAllTasks();
  if (name === 'stats') renderStats();
}

// ── RENDER TODAY ──
function renderToday() {
  const today = todayKey();
  const done = completions[today] || [];
  const todayTasks = tasks.filter(t => isTaskForToday(t));

  const pending = todayTasks.filter(t => !done.includes(t.id));
  const completed = todayTasks.filter(t => done.includes(t.id));

  const pct = todayTasks.length ? Math.round((completed.length / todayTasks.length) * 100) : 0;
  document.getElementById('progress-text').textContent = `${completed.length} of ${todayTasks.length} done`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  document.getElementById('pending-list').innerHTML = pending.length
    ? pending.map(t => taskCardHTML(t, false)).join('')
    : '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p>All done! Great work 🎉</p></div>';

  const doneSection = document.getElementById('done-section');
  if (completed.length > 0) {
    doneSection.style.display = 'block';
    document.getElementById('done-list').innerHTML = completed.map(t => taskCardHTML(t, true)).join('');
  } else {
    doneSection.style.display = 'none';
  }

  // Upcoming
  const upcoming = getUpcomingTasks();
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const upcomingSection = document.getElementById('upcoming-section');
  if (upcoming.length > 0) {
    upcomingSection.style.display = 'block';
    document.getElementById('upcoming-list').innerHTML = upcoming.map(({task, daysAway, date}) => {
      const label = daysAway === 1 ? 'Tomorrow' : dayNames[date.getDay()];
      const emoji = categoryEmoji[task.category] || '📌';
      return `<div class="upcoming-card">
        <div class="upcoming-day-badge">
          <div class="upcoming-day-num">${date.getDate()}</div>
          <div class="upcoming-day-label">${label}</div>
        </div>
        <div>
          <div class="upcoming-task-name">${emoji} ${task.name}</div>
          <div class="upcoming-task-sub">${getScheduleLabel(task)}</div>
        </div>
      </div>`;
    }).join('');
  } else {
    upcomingSection.style.display = 'none';
  }
}

function isTaskForToday(task) {
  const d = new Date();
  if (task.freq === 'daily') return true;
  if (task.freq === 'once') return true;
  if (task.freq === 'weekly') {
    return task.weekDay !== undefined ? d.getDay() === task.weekDay : true;
  }
  if (task.freq === 'monthly') {
    return task.monthDay !== undefined ? d.getDate() === task.monthDay : true;
  }
  return true;
}

function getScheduleLabel(task) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const ordinal = n => { const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
  if (task.freq === 'weekly' && task.weekDay !== undefined) return 'Every ' + days[task.weekDay];
  if (task.freq === 'monthly' && task.monthDay !== undefined) return 'Every ' + ordinal(task.monthDay);
  if (task.freq === 'daily') return 'Every day';
  return '';
}

function getUpcomingTasks() {
  const upcoming = [];
  for (let i = 1; i <= 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    tasks.forEach(task => {
      if (task.freq === 'weekly' && task.weekDay !== undefined && d.getDay() === task.weekDay) {
        upcoming.push({ task, daysAway: i, date: d });
      }
      if (task.freq === 'monthly' && task.monthDay !== undefined && d.getDate() === task.monthDay) {
        upcoming.push({ task, daysAway: i, date: d });
      }
    });
  }
  return upcoming.sort((a,b) => a.daysAway - b.daysAway).slice(0, 6);
}

function taskCardHTML(task, isDone) {
  const emoji = categoryEmoji[task.category] || '📌';
  const badgeClass = freqColors[task.freq] || 'badge-daily';
  const schedLabel = getScheduleLabel(task);
  const schedStr = schedLabel ? `<span class="task-time">📅 ${schedLabel}</span>` : '';
  const timeStr = task.time ? `<span class="task-time"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${task.time}</span>` : '';
  const dot = task.reminder ? '<span class="task-reminder-dot"></span>' : '';
  return `<div class="task-card ${isDone ? 'done' : ''}">
    <div class="task-check ${isDone ? 'checked' : ''}" onclick="toggleTask(${task.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="task-info">
      <div class="task-name">${emoji} ${task.name}</div>
      <div class="task-meta">
        <span class="task-badge ${badgeClass}">${task.freq}</span>
        ${schedStr}${timeStr}${dot}
      </div>
    </div>
    <button class="task-menu-btn" onclick="openEditModal(${task.id})" title="Edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <button class="task-menu-btn" onclick="deleteTask(${task.id})" title="Delete">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
  </div>`;
}

// ── TOGGLE TASK ──
function toggleTask(id) {
  const today = todayKey();
  if (!completions[today]) completions[today] = [];
  const idx = completions[today].indexOf(id);
  if (idx === -1) {
    completions[today].push(id);
    showToast('Task completed! ✓');
  } else {
    completions[today].splice(idx, 1);
  }
  save();
  renderToday();
  renderStats();
}

// ── DELETE TASK ──
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderToday();
  renderAllTasks();
  renderStats();
  showToast('Task removed');
}

// ── RENDER ALL TASKS ──
function renderAllTasks() {
  const list = document.getElementById('all-tasks-list');
  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>No tasks yet. Add your first one!</p></div>';
    return;
  }
  list.innerHTML = tasks.map(t => taskCardHTML(t, false)).join('');
}

// ── RENDER STATS ──
function renderStats() {
  const today = todayKey();
  const todayDone = (completions[today] || []).length;
  const total = tasks.length;

  // Week completions
  let weekDone = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    weekDone += (completions[key] || []).length;
  }

  // Streak
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    if ((completions[key] || []).length > 0) streak++;
    else break;
  }

  const rate = total > 0 ? Math.round((todayDone / Math.max(tasks.filter(t => isTaskForToday(t)).length, 1)) * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-today').textContent = todayDone;
  document.getElementById('stat-week').textContent = weekDone;
  document.getElementById('stat-rate').textContent = rate + '%';
  document.getElementById('streak-num').textContent = streak;
}

// ── MODAL ──
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('task-name').focus();
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('task-name').value = '';
  document.getElementById('task-time').value = '';
  document.getElementById('task-reminder').value = '';
  selectedFreq = 'daily';
  document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.freq-btn')[0].classList.add('selected');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

function selectFreq(freq, btn) {
  selectedFreq = freq;
  document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ── EDIT MODAL ──
let editingTaskId = null;
let selectedEditFreq = 'daily';

function openEditModal(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingTaskId = id;
  selectedEditFreq = task.freq;
  document.getElementById('edit-task-name').value = task.name;
  document.getElementById('edit-task-time').value = task.time || '';
  document.getElementById('edit-task-category').value = task.category || 'personal';
  document.getElementById('edit-task-reminder').value = task.reminder || '';
  document.querySelectorAll('#edit-freq-grid .freq-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.toLowerCase() === task.freq);
  });
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingTaskId = null;
}
function selectEditFreq(freq, btn) {
  selectedEditFreq = freq;
  document.querySelectorAll('#edit-freq-grid .freq-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
function saveEdit() {
  const task = tasks.find(t => t.id === editingTaskId);
  if (!task) return;
  const name = document.getElementById('edit-task-name').value.trim();
  if (!name) { showToast('Please enter a task name'); return; }
  task.name = name;
  task.time = document.getElementById('edit-task-time').value;
  task.freq = selectedEditFreq;
  task.category = document.getElementById('edit-task-category').value;
  task.reminder = document.getElementById('edit-task-reminder').value;
  save();
  closeEditModal();
  renderToday();
  renderAllTasks();
  renderStats();
  showToast('Task updated! ✓');
}
document.getElementById('edit-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-modal')) closeEditModal();
});

function addTask() {
  const name = document.getElementById('task-name').value.trim();
  if (!name) { showToast('Please enter a task name'); return; }
  const task = {
    id: Date.now(),
    name,
    time: document.getElementById('task-time').value,
    freq: selectedFreq,
    category: document.getElementById('task-category').value,
    reminder: document.getElementById('task-reminder').value
  };
  tasks.push(task);
  save();
  closeModal();
  renderToday();
  renderAllTasks();
  renderStats();
  showToast('Task added! ✓');
  scheduleReminders();
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── REMINDERS (browser notifications) ──
function scheduleReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  tasks.forEach(task => {
    if (!isTaskForToday(task)) return;
    const remind = new Date();
    if (task.reminder === 'morning' || !task.time) {
      remind.setHours(8, 0, 0, 0);
    } else if (task.time) {
      const [h, m] = task.time.split(':').map(Number);
      remind.setHours(h, m, 0, 0);
      if (task.reminder === '15min') remind.setMinutes(remind.getMinutes() - 15);
      if (task.reminder === '30min') remind.setMinutes(remind.getMinutes() - 30);
      if (task.reminder === '1hr') remind.setHours(remind.getHours() - 1);
    } else return;
    const diff = remind - now;
    if (diff > 0 && diff < 86400000) {
      setTimeout(() => {
        new Notification('TaskFlow Reminder 🧹', {
          body: task.name + ' — due today',
          icon: '/favicon.ico'
        });
      }, diff);
    }
  });
}
